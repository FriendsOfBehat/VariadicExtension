name: Build

on:
    push: ~
    pull_request: ~
    release:
        types: [created]
    schedule:
        -   cron: "0 1 * * 6" # Run at 1am every Saturday

jobs:
    tests:
        runs-on: ubuntu-latest
        name: "PHP ${{ matrix.php }}, Symfony ${{ matrix.symfony }}, Behat ${{ matrix.behat }}, ${{ matrix.dependencies }} deps"
        strategy:
            fail-fast: false
            matrix:
                php: ["8.1", "8.2", "8.3"]
                symfony: ["^5.4", "^6.4", "^7.4"]
                behat: ["^3.8"]
                dependencies: ["lowest", "highest"]
                exclude:
                    -   symfony: "^7.4"
                        php: "8.1"
                include:
                    -   php: "8.3"
                        symfony: "^7.4"
                        behat: "4.x-dev"
                        dependencies: "highest"
                    -   php: "8.4"
                        symfony: "^8.0"
                        behat: "4.x-dev"
                        dependencies: "highest"

        steps:
            -   uses: actions/checkout@v6

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: "${{ matrix.php }}"
                    coverage: none

            -   name: Restrict Symfony version
                if: matrix.symfony != ''
                run: |
                    composer global require --no-progress --no-scripts --no-plugins "symfony/flex"
                    composer global config --no-plugins allow-plugins.symfony/flex true
                    composer config extra.symfony.require "${{ matrix.symfony }}"
                    composer config minimum-stability "dev"
                    composer config prefer-stable true

            -   name: Restrict Behat version
                run: composer require --no-update "behat/behat:${{ matrix.behat }}"

            -   name: Install dependencies
                run: composer update ${{ matrix.dependencies == 'lowest' && '--prefer-lowest --prefer-stable' || '' }}

            -   name: Run analysis
                if: matrix.behat != '4.x-dev'
                run: composer validate --strict

            -   name: Run tests
                run: vendor/bin/behat --strict -vvv --no-interaction
